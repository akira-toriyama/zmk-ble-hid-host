# NOTE: Kconfig fragments do NOT allow trailing inline comments after a value
# (the parser would take "2  # ..." as the value). Keep comments on their own lines.

# Bluetooth LE Central / GATT client
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_DEVICE_NAME="XIAO HOGP Probe"

# Security / bonding. SMP debug proved (on the wire) that the IST PRO is LE
# *legacy* only: its Pairing Response is io 0x03 (NoInputNoOutput), auth_req
# 0x01 — SC=0, MITM=0. So the only viable method is Just Works (unauthenticated)
# over legacy pairing. The Zephyr default BT_SMP_SC_PAIR_ONLY=y forces Secure
# Connections and was the real bond blocker: it rejected the mouse's SC=0
# response with "Authentication Requirements" (status 0x03 / bt_security_err 4).
# Allow legacy pairing so the Just Works bond completes.
CONFIG_BT_SMP=y
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_SMP_SC_PAIR_ONLY=n

# Verbose SMP: confirms the negotiated method and that the legacy bond completes.
CONFIG_BT_SMP_LOG_LEVEL_DBG=y

# Bond persistence (settings -> NVS -> flash). storage_partition is in the board DTS.
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# GATT client conveniences
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y
CONFIG_BT_GATT_AUTO_UPDATE_MTU=y

# Reconnect to a bonded peer; a peer RPA is resolved automatically via the
# stored IRK (BT_SMP). BT_PRIVACY is about our own address and is not needed.
CONFIG_BT_SCAN_WITH_IDENTITY=y

# Connection counts (single mouse). MAX_PAIRED default 1 would evict on re-bond.
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=2

# USB CDC ACM console + logging. main() owns the single usb_enable() + DTR gate,
# so disable boot-time USB init.
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n
CONFIG_USB_CDC_ACM=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_USB_DEVICE_PRODUCT="XIAO HOGP Probe"
CONFIG_USB_DEVICE_PID=0x0004

# Logging deferred so early lines survive a late host port-open.
# Do NOT use CONFIG_LOG_MODE_IMMEDIATE (would drop boot-time lines).
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_BT_LOG_LEVEL_INF=y
# Bigger deferred buffer so a burst of SMP DBG lines during pairing isn't
# dropped by scan-log churn (default 1024 is too small to hold the trace).
CONFIG_LOG_BUFFER_SIZE=4096

# Misc
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ASSERT=y
