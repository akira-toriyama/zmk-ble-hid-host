# ── Bluetooth LE Central / GATT client ───────────────────────────────────────
CONFIG_BT=y
CONFIG_BT_CENTRAL=y                 # selects BT_OBSERVER + BT_CONN
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_DEVICE_NAME="XIAO HOGP Probe"

# ── Security / bonding (Just Works, NoInputNoOutput) ─────────────────────────
# IO capability NoInputNoOutput => Just Works is chosen at RUNTIME by leaving all
# passkey callbacks NULL in the registered bt_conn_auth_cb. There is NO Kconfig.
# Do NOT set CONFIG_BT_FIXED_PASSKEY (would force DISPLAY_ONLY).
CONFIG_BT_SMP=y                     # selects BT_CRYPTO + BT_RPA + BT_ECC
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y

# ── Bond persistence (settings -> NVS -> flash) ──────────────────────────────
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y                        # settings backend; storage_partition is in the xiao_ble DTS

# ── GATT client conveniences ─────────────────────────────────────────────────
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y
CONFIG_BT_GATT_AUTO_UPDATE_MTU=y

# ── Reconnect to a bonded (possibly RPA) peer ────────────────────────────────
CONFIG_BT_SCAN_WITH_IDENTITY=y      # hear directed adv to our identity (depends on !BT_PRIVACY)
# Peer RPA resolution is automatic via the stored IRK + BT_SMP. BT_PRIVACY is NOT needed.

# ── Connection counts (single mouse) ─────────────────────────────────────────
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=2              # mouse + 1 headroom slot (default 1 would evict on re-bond)

# ── USB CDC ACM console + logging ────────────────────────────────────────────
# Take manual control of usb_enable() so main() can DTR-gate the first output.
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n
CONFIG_USB_CDC_ACM=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y             # required for the uart_line_ctrl_get() DTR poll
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_USB_DEVICE_PRODUCT="XIAO HOGP Probe"
CONFIG_USB_DEVICE_PID=0x0004

# ── Logging (deferred; survives a late host port-open) ───────────────────────
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y          # do NOT use IMMEDIATE: early lines would be lost
CONFIG_BT_LOG_LEVEL_INF=y

# ── Misc ─────────────────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_ASSERT=y
