#
# Dedicated USB trackball dongle: decoded mouse motion is output over USB HID
# to the PC (the XIAO is plugged into the PC).
#
# We deliberately turn the ZMK BLE *peripheral* role OFF. CONFIG_ZMK_BLE
# `select`s BT_SMP_SC_PAIR_ONLY (zmk app/Kconfig), which forces LE Secure
# Connections globally. The ELECOM IST PRO is LE-legacy only (NoInputNoOutput,
# SC=0), so with ZMK_BLE=y the central->trackball bond is impossible (proven on
# device, M1). With ZMK_BLE=n this module owns the BT stack as a *central*
# (added in the hog_central milestone) and may allow legacy Just Works pairing
# via CONFIG_BT_SMP_SC_PAIR_ONLY=n. USB output is the natural transport since
# the dongle is wired to the PC anyway.
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=y

# Pointing pipeline: pulls in CONFIG_INPUT, the input-listener processing, and
# the mouse HID usage page so decoded REL_X/Y/WHEEL + buttons reach the PC.
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y

# --- BLE central to the trackball (this module owns the BT stack) ---
# With ZMK_BLE=n, ZMK core does not init Bluetooth, so the hog_central driver
# calls bt_enable()/settings_load() itself (like the M1 probe). Nothing selects
# BT_SMP_SC_PAIR_ONLY now, so the =n below actually takes effect -> LE legacy
# Just Works pairing with the IST PRO is permitted (proven necessary on device).
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_OBSERVER=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y
CONFIG_BT_SMP=y
CONFIG_BT_SMP_SC_PAIR_ONLY=n
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
# Persist bonds (LTK/IRK) to flash so they survive a reboot -- specifically
# unplugging this dongle from USB and plugging it back in. BT_SETTINGS depends
# on the SETTINGS subsystem (NVS-backed flash partition). With ZMK_BLE=n, ZMK
# does NOT pull SETTINGS in, so a bare `CONFIG_BT_SETTINGS=y` is silently dropped
# (unmet dependency) and EVERY power-cycle loses the bond -> re-pairing. We must
# enable the whole chain ourselves, exactly as the M1 probe did. The
# storage_partition lives in the xiao_ble board DTS; settings_load() (in
# hog_central start) restores the bonds after bt_enable().
CONFIG_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_BT_SETTINGS=y
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=2

# Reconnect to an already-bonded trackball after a FULL link teardown -- the
# mouse is powered off then on, or this dongle is unplugged from USB and
# replugged. BLE pointing devices reconnect to a known host by sending *directed*
# advertisements (ADV_DIRECT_IND) targeted at the central's IDENTITY address.
# By default Zephyr scans using a non-resolvable private address (NRPA), so the
# controller filters those directed adverts out: the dongle never sees the mouse
# come back and the user is forced to re-pair. Scanning with our identity address
# lets the directed reconnect adverts reach us (device_found already accepts
# ADV_DIRECT_IND and matches the resolved bonded peer). Proven in the M1 probe;
# depends on !BT_PRIVACY, which holds here (we keep our own identity static).
CONFIG_BT_SCAN_WITH_IDENTITY=y

# Re-establish the HID subscriptions cleanly on RECONNECT. Observed on device
# (mouse power-cycled while the dongle stays up): the link comes back and the
# bond is reused (secured L2, no re-pair), but then:
#   bt_gatt: resub failed (err -12)   x2
#   ble_hid_host: HIDS discover failed (-12)        (-12 == -ENOMEM)
# so nothing re-subscribes -> the cursor stays frozen. Two causes, both fixed:
#  1) CONFIG_BT_GATT_AUTO_RESUBSCRIBE (Zephyr default y) auto-resubscribes the
#     PREVIOUS connection's params on reconnect. We already re-run GATT discovery
#     and re-subscribe ourselves from security_changed(), so the auto path is
#     redundant AND races our discovery for the tiny ATT/L2CAP buffer pool ->
#     both -ENOMEM. Turn it off; reconnect then uses only our explicit path
#     (a clean disconnect tears the old subs down via notify_cb(NULL)).
CONFIG_BT_GATT_AUTO_RESUBSCRIBE=n
#  2) The default TX buffer counts (3) are marginal for discovering + subscribing
#     to 5 HID report characteristics back-to-back (already saw "Not enough buffer
#     space for L2CAP data" on the very first connect, P-B'). Give the GATT client
#     headroom so discovery + the 5 CCC writes never starve.
CONFIG_BT_L2CAP_TX_BUF_COUNT=8
CONFIG_BT_ATT_TX_COUNT=8
CONFIG_BT_BUF_ACL_TX_COUNT=8
CONFIG_BT_CONN_TX_MAX=8

# RX buffers -- the fix for the "move immediately after power-on -> moves a
# little then freezes, never recovers" wedge. The bonded mouse has persistent
# CCC, so on reconnect it RESUMES notifications immediately, flooding the RX
# path DURING our GATT discovery. The Nordic LLL only ACKs an incoming data PDU
# when >=3 RX nodes are free (lll_conn.c ull_pdu_rx_alloc_peek(3)); the RX pool
# was provisioned to depth 1 (we'd only bumped the TX side). Under the flood it
# drains below 3 -> the peer's PDUs go unacked -> either a retransmit storm that
# trips the supervision timeout (disconnect reason 0x08) or, if 1-2 nodes stay
# free, a self-sustaining NESN stall: events run (so supervision never fires)
# but nothing is acked, so no host buffer ever recycles -> permanent deadlock
# (log goes silent, cursor frozen, needs a power-cycle). Enlarging both ends of
# the RX pool keeps it above the ACK reserve through the burst.
CONFIG_BT_CTLR_RX_BUFFERS=6
CONFIG_BT_BUF_ACL_RX_COUNT_EXTRA=6
