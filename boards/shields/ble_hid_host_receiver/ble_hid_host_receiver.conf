#
# Dedicated USB trackball dongle: decoded mouse motion is output over USB HID
# to the PC (the XIAO is plugged into the PC).
#
# We deliberately turn the ZMK BLE *peripheral* role OFF. CONFIG_ZMK_BLE
# `select`s BT_SMP_SC_PAIR_ONLY (zmk app/Kconfig), which forces LE Secure
# Connections globally. The ELECOM IST PRO is LE-legacy only (NoInputNoOutput,
# SC=0), so with ZMK_BLE=y the central->trackball bond is impossible (proven on
# device, M1). With ZMK_BLE=n this module owns the BT stack as a *central*
# (added in the hog_central milestone) and may allow legacy Just Works pairing
# via CONFIG_BT_SMP_SC_PAIR_ONLY=n. USB output is the natural transport since
# the dongle is wired to the PC anyway.
CONFIG_ZMK_BLE=n
CONFIG_ZMK_USB=y

# Pointing pipeline: pulls in CONFIG_INPUT, the input-listener processing, and
# the mouse HID usage page so decoded REL_X/Y/WHEEL + buttons reach the PC.
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y

